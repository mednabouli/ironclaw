# Default values for ironclaw Helm chart

replicaCount: 1

image:
  repository: ghcr.io/mednabouli/ironclaw
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to Chart appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ironclaw.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 200m
    memory: 32Mi
  requests:
    cpu: 50m
    memory: 8Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# IronClaw configuration (rendered into ConfigMap)
config:
  providers:
    primary: ollama
  channels:
    rest:
      enabled: true
      host: "0.0.0.0"
      port: 3000
  memory:
    backend: inmemory
  telemetry:
    log_level: info

# Secrets — provide via --set or external secret manager
secrets:
  # anthropicApiKey: ""
  # openaiApiKey: ""
  # groqApiKey: ""
