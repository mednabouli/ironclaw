# cargo-deny configuration — run with: cargo deny check

[graph]
all-features = true

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name    = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[advisories]
version    = 2
db-path    = "~/.cargo/advisory-db"
db-urls    = ["https://github.com/rustsec/advisory-db"]
ignore     = [
    # rustls-webpki 0.102.8 CRL matching — transitive via serenity 0.12.5 (latest; no upstream fix)
    "RUSTSEC-2026-0049",
    # time 0.3.36 stack exhaustion — pinned for MSRV 1.86 (0.3.47 fix requires Rust 1.88)
    "RUSTSEC-2026-0009",
    # instant unmaintained — transitive via notify 7 (no upstream fix)
    "RUSTSEC-2024-0384",
    # number_prefix unmaintained — transitive via indicatif 0.17
    "RUSTSEC-2025-0119",
]

[bans]
multiple-versions = "allow"
wildcards         = "allow"
deny = [
    { name = "openssl", reason = "Use rustls instead — avoids OpenSSL dependency" },
]

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
