# cargo-deny configuration — run with: cargo deny check

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "aarch64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name    = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[advisories]
version    = 2
db-path    = "~/.cargo/advisory-db"
db-urls    = ["https://github.com/rustsec/advisory-db"]
ignore     = [
    # instant unmaintained — transitive via notify 7 (no upstream fix)
    "RUSTSEC-2024-0384",
    # number_prefix unmaintained — transitive via indicatif 0.17
    "RUSTSEC-2025-0119",
]

[bans]
multiple-versions = "warn"
wildcards         = "allow"
deny = [
    { name = "openssl", reason = "Use rustls instead — avoids OpenSSL dependency" },
]

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
