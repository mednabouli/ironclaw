name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check format
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check docs
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --workspace --lib --all-features

      - name: Run integration tests
        run: cargo test --workspace --test '*' --all-features
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  msrv:
    name: Minimum Supported Rust Version (1.86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.86
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features

  supply-chain:
    name: Supply Chain Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-vet
        run: cargo install cargo-vet

      - name: Run cargo-vet
        run: cargo vet

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: Coverage Gate (≥80% ironclaw-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Measure ironclaw-core coverage
        run: |
          cargo tarpaulin -p ironclaw-core --lib --tests --skip-clean \
            --timeout 120 --out xml --output-dir target/tarpaulin

      - name: Check coverage threshold
        run: |
          # Extract ironclaw-core line coverage from Cobertura XML
          TOTAL=$(grep -oP 'line-rate="\K[^"]+' target/tarpaulin/cobertura.xml | head -1)
          PCT=$(echo "$TOTAL * 100" | bc -l | xargs printf "%.1f")
          echo "Coverage: ${PCT}%"
          # Fail if below 80%
          if (( $(echo "$TOTAL < 0.80" | bc -l) )); then
            echo "::error::Coverage ${PCT}% is below the 80% threshold"
            exit 1
          fi
