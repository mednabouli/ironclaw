name: "🐛 Bug Report"
description: "Something is broken or behaving unexpectedly."
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please fill in as much as you can.
        If this is a security vulnerability, please use the [private advisory](../security/advisories) instead.

  - type: input
    id: version
    attributes:
      label: IronClaw Version
      description: Run `ironclaw --version` to find this.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.3 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: input
    id: rust
    attributes:
      label: Rust Version
      description: Run `rustc --version`.
      placeholder: "rustc 1.80.0"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Provider being used
      options:
        - ollama
        - anthropic (claude)
        - openai
        - groq
        - openrouter
        - other / not relevant
    validations:
      required: false

  - type: dropdown
    id: channel
    attributes:
      label: Channel being used
      options:
        - cli
        - rest
        - telegram
        - discord
        - other / not relevant
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include error messages and stack traces.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      value: |
        1. Configure ironclaw.toml with ...
        2. Run `ironclaw ...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: ironclaw.toml (redact all secrets)
      description: Paste your config here. REMOVE all API keys before submitting.
      render: toml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Run with `RUST_LOG=debug ironclaw ...` and paste relevant output.
      render: text
    validations:
      required: false
